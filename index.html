<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Poker Helper</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f5438" />
  <meta name="description" content="Dylan 的扑克 session 计时和记录" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Poker Helper" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="css/styles.css?v=5" />

  <!-- mobile debug console, only when ?debug=1 -->
  <script>
    if (new URLSearchParams(location.search).get("debug") === "1") {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/eruda";
      s.onload = () => window.eruda.init();
      document.head.appendChild(s);
    }
    // catch errors that fire before app.js is loaded
    window.__bootErrors = [];
    window.addEventListener("error", (e) => {
      window.__bootErrors.push(e.message + " @ " + (e.filename || "?") + ":" + (e.lineno || "?"));
      const el = document.getElementById("error-banner");
      if (el) {
        el.classList.remove("hidden");
        el.textContent = "⚠ " + window.__bootErrors.join("  |  ");
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      const msg = (e.reason && (e.reason.message || e.reason.toString())) || "rejection";
      window.__bootErrors.push(msg);
      const el = document.getElementById("error-banner");
      if (el) {
        el.classList.remove("hidden");
        el.textContent = "⚠ " + window.__bootErrors.join("  |  ");
      }
    });
  </script>
</head>
<body>
  <div id="error-banner" class="error-banner hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <!-- HOME -->
  <section id="view-home" class="view hidden">
    <header class="hero">
      <div class="spade">♠</div>
      <h1>Poker Helper</h1>
      <p class="subtitle">准备好就开打</p>
    </header>

    <div class="card">
      <h2>时长</h2>
      <div class="chips" id="duration-chips">
        <button type="button" class="chip" data-mins="120">2h</button>
        <button type="button" class="chip selected" data-mins="180">3h</button>
        <button type="button" class="chip" data-mins="240">4h</button>
        <button type="button" class="chip" data-custom>自定义</button>
      </div>
      <div id="duration-custom-wrap" class="hidden" style="margin-top:12px;">
        <input type="number" id="duration-custom-input" min="1" max="720" inputmode="numeric" placeholder="分钟 (如 150)" />
      </div>
    </div>

    <button id="start-btn" class="primary big">▶  Start Session</button>

    <div class="recent">
      <h2>最近</h2>
      <div id="recent-list" class="recent-list"></div>
    </div>
  </section>

  <!-- RUNNING -->
  <section id="view-running" class="view hidden">
    <header class="hero">
      <p class="subtitle">牌局进行中</p>
      <div id="countdown" class="countdown">--:--:--</div>
      <p class="subtitle" id="running-meta">开始于 --</p>
    </header>

    <div class="card">
      <h2>提示</h2>
      <div class="value muted small">
        计时基于开始时刻，关网页 / 锁屏都不会丢。<br>
        到点会响铃 + 震动 + 红色横幅。
      </div>
    </div>

    <button id="end-btn" class="danger big">⏹  End Session</button>
    <button id="ranges-btn" class="secondary big">📊  翻前范围</button>
  </section>

  <!-- ALARM -->
  <section id="view-alarm" class="view alarm-view hidden">
    <div class="alarm-banner">
      <div class="alarm-emoji">🚨</div>
      <h1 class="alarm-text">不要做没有纪律的<br>臭鱼！！！</h1>
      <p class="alarm-sub" id="alarm-elapsed">时间到了</p>
    </div>
    <div class="alarm-buttons">
      <button type="button" id="alarm-stop-btn" class="secondary">Stop（静音继续）</button>
      <button type="button" id="alarm-restart-btn" class="primary">Restart（再开一轮）</button>
      <button type="button" id="alarm-end-btn" class="danger">End Session</button>
    </div>
  </section>

  <!-- RECORD -->
  <section id="view-record" class="view hidden">
    <header class="hero">
      <h1>Session 结束</h1>
      <p class="subtitle" id="record-summary">--</p>
    </header>

    <form id="record-form" class="form">
      <label>Buy-in (USD)
        <input type="number" id="buy-in" step="0.01" inputmode="decimal" placeholder="0.00" required />
      </label>
      <label>Cash-out (USD)
        <input type="number" id="cash-out" step="0.01" inputmode="decimal" placeholder="0.00" required />
      </label>
      <label>备注 (可选)
        <textarea id="notes" rows="3" placeholder="场地 / 桌型 / 心得..."></textarea>
      </label>
      <button type="submit" id="save-btn" class="primary">保存</button>
      <button type="button" id="discard-btn" class="text-button">不保存，丢弃</button>
    </form>
  </section>

  <!-- RANGES -->
  <section id="view-ranges" class="view view-ranges hidden">
    <div class="ranges-header">
      <button type="button" id="ranges-close" class="text-button">← 返回</button>
      <div class="ranges-title">翻前范围</div>
      <div style="width:60px"></div>
    </div>

    <div class="chips" id="scenario-chips">
      <button type="button" class="chip selected" data-scenario="RFI">开池 RFI</button>
      <button type="button" class="chip" data-scenario="VS_UTG">vs UTG 开池</button>
    </div>

    <div class="chips" id="position-chips">
      <!-- filled by JS -->
    </div>

    <div class="range-grid" id="range-grid"><!-- filled by JS --></div>

    <div class="range-legend">
      <span><i class="dot dot-r"></i>加注</span>
      <span><i class="dot dot-c"></i>跟注</span>
      <span><i class="dot dot-f"></i>弃牌</span>
    </div>
  </section>

  <!-- EDIT EXISTING -->
  <section id="view-edit" class="view hidden">
    <header class="hero">
      <h1>编辑 Session</h1>
      <p class="subtitle" id="edit-summary">--</p>
    </header>

    <form id="edit-form" class="form">
      <label>开始时间
        <input type="datetime-local" id="edit-started-at" required />
      </label>
      <label>结束时间
        <input type="datetime-local" id="edit-ended-at" required />
      </label>
      <label>目标时长（分钟）
        <input type="number" id="edit-planned" min="1" max="720" inputmode="numeric" required />
      </label>
      <label>Buy-in (USD)
        <input type="number" id="edit-buy-in" step="0.01" inputmode="decimal" required />
      </label>
      <label>Cash-out (USD)
        <input type="number" id="edit-cash-out" step="0.01" inputmode="decimal" required />
      </label>
      <label>备注
        <textarea id="edit-notes" rows="3"></textarea>
      </label>
      <button type="submit" id="edit-save-btn" class="primary">保存</button>
      <button type="button" id="edit-delete-btn" class="danger">删除这条</button>
      <button type="button" id="edit-cancel-btn" class="text-button">取消</button>
    </form>
  </section>

  <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
